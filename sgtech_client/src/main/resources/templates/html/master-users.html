<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>관리자 회원관리</title>
<link rel="stylesheet" th:href="@{/style/style.css}">
<style>
/* [기능용] 선택된 행 표시 */
.shuttle-table tbody tr {
	cursor: pointer;
}

.shuttle-table tbody tr.selected {
	background-color: #e0f2fe;
}

/* 필터 영역 스타일 보정 */
.filter-area select {
	cursor: pointer;
	outline: none;
}

.filter-area select:focus {
	border-color: #007bff;
}
</style>
</head>
<body>

	<header th:replace="~{layout/layout :: myHeader}"></header>

	<div
		th:if="${session.loginUser != null and session.loginUser.user_role == 'MASTER'}"
		th:replace="~{layout/master-layout :: masterTabs('users')}"></div>

	<div class="container">
		<main class="content">
			<div class="header-row">
				<div class="welcome-msg">
					<span style="font-size: 1.2em; font-weight: bold;">👥 사원 및 유저 관리</span> 
					<span style="font-size: 0.9em; color: #666; margin-left: 10px;">
						좌측 목록에서 사원을 선택하여 유저로 등록하거나, 우측에서 유저를 선택하여 권한을 해제하세요. 
					</span>
				</div>
			</div>

			<div class="transfer-container">

				<div class="transfer-box">
					<div class="box-header">
						미등록 사원 (EMP) <span class="count"
							th:text="'(' + ${#lists.size(noneUserList)} + '명)'">(0명)</span>
					</div>
					<div class="box-content">
						<table class="shuttle-table" id="leftTable">
							<thead>
								<tr>
									<th>사번</th>
									<th>이름</th>
									<th>부서</th>
									<th>직급</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="emp : ${noneUserList}"
									th:onclick="selectRow(this, 'left')" th:data-id="${emp.emp_no}">
									<td th:text="${emp.emp_no}">1</td>
									<td th:text="${emp.emp_name}">이름</td>
									<td th:text="${emp.dept_name}">부서</td>
									<td th:text="${emp.rnk_name}">직급</td>
								</tr>
								<tr th:if="${#lists.isEmpty(noneUserList)}">
									<td colspan="4" style="color: #999; padding: 30px;">등록 가능한 사원이 없습니다.</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>

				<div class="transfer-controls">
					<button type="button" class="arrow-btn" onclick="moveToRight()" title="유저로 등록">➡</button>
					<button type="button" class="arrow-btn" onclick="moveToLeft()" title="유저 권한 해제">⬅</button>
					<style>
						.arrow-btn:last-child {
							transform: rotate(180deg);
						}
						.arrow-btn:last-child:hover {
							transform: rotate(180deg) scale(1.1);
						}
					</style>
				</div>

				<div class="transfer-box">
					<div class="box-header">
						등록된 유저 (USER) <span class="count" id="userCount"
							th:text="'(' + ${#lists.size(userList)} + '명)'">(0명)</span>
					</div>

					<div class="filter-area"
						style="padding: 10px 15px; background: #f8fafc; border-bottom: 1px solid #ddd; display: flex; gap: 10px;">
						<select id="deptFilter" onchange="filterUsers()"
							class="custom-select"
							style="flex: 1; padding: 5px; border-radius: 4px; border: 1px solid #ccc;">
							<option value="all">전체 부서</option>
						</select>
					</div>

					<div class="box-content">
						<table class="shuttle-table" id="rightTable">
							<thead>
								<tr>
									<th>USER No.</th>
									<th>이름</th>
									<th>부서</th>
									<th>권한</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="user : ${userList}"
									th:onclick="selectRow(this, 'right')"
									th:data-id="${user.user_no}" th:data-dept="${user.dept_name}">
									<td th:text="${user.user_no}">1</td>
									<td th:text="${user.emp_name}">이름</td>
									<td th:text="${user.dept_name}">부서</td>
									<td>
										<span th:text="${user.user_role}"
											th:class="${user.user_role == 'MASTER' ? 'badge-box bg-green' : 'badge-box bg-green'}"
											style="font-size: 11px; padding: 2px 6px; border-radius: 4px; color: white;">USER</span>
									</td>
								</tr>
								<tr th:if="${#lists.isEmpty(userList)}" id="noUserRow">
									<td colspan="4" style="color: #999; padding: 30px;">등록된 유저가 없습니다.</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>

			</div>
		</main>
	</div>

	<th:block th:replace="~{layout/master-layout :: commonScripts}"></th:block>

	<script th:inline="javascript">
        // 전역 변수
        let selectedEmpNo = null; 
        let selectedUserNo = null;  

        document.addEventListener("DOMContentLoaded", function() {
            initDeptFilter();
        });

        // [기능 1] 유저 테이블에서 부서 목록을 추출하여 셀렉트 박스 생성
        function initDeptFilter() {
            const rows = document.querySelectorAll('#rightTable tbody tr[data-dept]');
            const deptSet = new Set();
            const deptFilter = document.getElementById('deptFilter');

            rows.forEach(row => {
                const dept = row.getAttribute('data-dept');
                if (dept && dept.trim() !== "") {
                    deptSet.add(dept.trim());
                }
            });

            // 추출된 부서명을 가나다 순으로 정렬하여 추가
            Array.from(deptSet).sort().forEach(dept => {
                const option = document.createElement('option');
                option.value = dept;
                option.textContent = dept;
                deptFilter.appendChild(option);
            });
        }

        // [기능 2] 부서 선택 시 실시간 필터링
        function filterUsers() {
            const selectedDept = document.getElementById('deptFilter').value;
            const rows = document.querySelectorAll('#rightTable tbody tr[data-dept]');
            const noUserRow = document.getElementById('noUserRow');
            let visibleCount = 0;

            rows.forEach(row => {
                const userDept = row.getAttribute('data-dept');
                
                if (selectedDept === 'all' || userDept === selectedDept) {
                    row.style.display = '';
                    visibleCount++;
                } else {
                    row.style.display = 'none';
                    // 화면에서 사라지는 행이 선택된 상태였다면 선택 해제
                    if (row.classList.contains('selected')) {
                        row.classList.remove('selected');
                        selectedUserNo = null;
                    }
                }
            });

            // 인원수 텍스트 업데이트
            const userCountSpan = document.getElementById('userCount');
            if(userCountSpan) userCountSpan.innerText = '(' + visibleCount + '명)';
            
            // 필터링 결과 아무도 없을 때 안내 문구 노출 제어
            if (noUserRow) {
                noUserRow.style.display = (visibleCount === 0) ? '' : 'none';
            }
        }        
        
        // [기능 3] 테이블 행 클릭 시 선택 처리
        function selectRow(row, side) {
            const tableId = side === 'left' ? 'leftTable' : 'rightTable';
            const rows = document.querySelectorAll(`#${tableId} tbody tr`);
            rows.forEach(r => r.classList.remove('selected'));

            row.classList.add('selected');
            const id = row.getAttribute('data-id');
            
            if (side === 'left') {
                selectedEmpNo = id;
                document.querySelectorAll('#rightTable tbody tr').forEach(r => r.classList.remove('selected'));
                selectedUserNo = null;
            } else {
                selectedUserNo = id;
                document.querySelectorAll('#leftTable tbody tr').forEach(r => r.classList.remove('selected'));
                selectedEmpNo = null;
            }
        }

        // [기능 4] 유저 등록 (왼쪽 -> 오른쪽)
        function moveToRight() {
            if (!selectedEmpNo) {
                alert("왼쪽 목록에서 추가할 사원을 선택해주세요.");
                return;
            }
            if (!confirm("선택한 사원을 유저로 등록하시겠습니까?")) return;

            fetch('/master/user/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'emp_no=' + selectedEmpNo
            })
            .then(res => res.text())
            .then(result => {
                if (result === "success") {
                    location.reload();  
                } else {
                    alert("등록 실패: 이미 등록된 유저이거나 오류가 발생했습니다.");
                }
            })
            .catch(err => {
                console.error(err);
                alert("서버 연결 오류");
            });
        }

        // [기능 5] 유저 해제 (오른쪽 -> 왼쪽)
        function moveToLeft() {
            if (!selectedUserNo) {
                alert("오른쪽 목록에서 삭제할 유저를 선택해주세요.");
                return;
            }
            if (!confirm("선택한 유저의 권한을 삭제하시겠습니까?\n(사원 정보는 유지됩니다)")) return;

            fetch('/master/user/remove', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'user_no=' + selectedUserNo
            })
            .then(res => res.text())
            .then(result => {
                if (result === "success") {
                    location.reload();  
                } else {
                    alert("삭제 실패");
                }
            })
            .catch(err => {
                console.error(err);
                alert("서버 연결 오류");
            });
        }
    </script>
</body>
</html>
