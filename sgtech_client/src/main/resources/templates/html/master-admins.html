<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>게시판 글쓰기 권한관리</title>
<link rel="stylesheet" th:href="@{/style/style.css}">
<style>
/* UI 스타일 보정 */
.selected {
	background-color: #f1f3f5 !important;
	font-weight: bold;
	border-left: 5px solid #007bff;
}

.transfer-container {
	display: flex;
	justify-content: center;
	align-items: stretch;
	gap: 10px;
	margin-top: 20px;
}

.transfer-box {
	flex: 1;
	border: 1px solid #ddd;
	border-radius: 8px;
	background: #fff;
	display: flex;
	flex-direction: column;
}

.box-header {
	background: #f8f9fa;
	padding: 12px;
	font-weight: bold;
	border-bottom: 1px solid #ddd;
	display: flex;
	justify-content: space-between;
}

.box-content {
	flex: 1;
	overflow-y: auto;
	max-height: 500px;
}

.transfer-controls {
	display: flex;
	flex-direction: column;
	justify-content: center;
	gap: 15px;
	padding: 0 10px;
}

.arrow-btn {
	cursor: pointer;
	padding: 12px;
	font-size: 15px;
	font-weight: bold;
	border: 1px solid #007bff;
	background: #fff;
	color: #007bff;
	border-radius: 6px;
	transition: 0.2s;
}

.arrow-btn:hover {
	background: #007bff;
	color: #fff;
}

.shuttle-table {
	width: 100%;
	border-collapse: collapse;
	font-size: 13px;
}

.shuttle-table th {
	position: sticky;
	top: 0;
	background: #eee;
	padding: 10px;
	border-bottom: 1px solid #ddd;
}

.shuttle-table td {
	padding: 10px;
	border-bottom: 1px solid #f1f1f1;
	text-align: center;
}

.access-table {
	width: 100%;
	border-collapse: collapse;
	margin-top: 10px;
}

.access-table th, .access-table td {
	border: 1px solid #ddd;
	padding: 8px;
	text-align: center;
}

/* 중앙 버튼 영역 스타일 */
.transfer-controls {
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center; /* 중앙 정렬 */
	gap: 30px;
	padding: 0 10px;
	width: 100px; /* 너비 유지 */
	min-width: 100px;
}

/* 버튼 래퍼 (텍스트 + 화살표) */
.btn-wrapper {
	display: flex;
	flex-direction: column;
	align-items: center;
	cursor: pointer;
	transition: transform 0.2s;
}

.btn-wrapper:hover {
	transform: scale(1.1);
}

/* 텍스트 (파란색, 굵게) */
.btn-label {
	font-size: 14px;
	font-weight: bold;
	color: #007bff;
	margin-bottom: -5px; /* 화살표와 딱 붙이기 */
}

/* 화살표 아이콘 버튼 (배경/테두리 없음, 글자만 큼) */
.arrow-icon-btn {
	background: none;
	border: none;
	color: #007bff; /* 파란색 */
	font-size: 40px; /* 화살표 크기 확대 */
	font-weight: bold;
	cursor: pointer;
	padding: 0;
	line-height: 1;
}

/* 호버 시 색상 약간 진하게 */
.btn-wrapper:hover .arrow-icon-btn, .btn-wrapper:hover .btn-label {
	color: #0056b3;
}
</style>
</head>
<body>
	<header th:replace="~{layout/layout :: myHeader}"></header>

	<div
		th:if="${session.loginUser != null and (session.loginUser.user_role == 'MASTER' or session.loginUser.user_role == 'ADMIN')}"
		th:replace="~{layout/master-layout :: masterTabs('users')}"></div>

	<div class="container">
		<main class="content">
			<div class="header-row">
				<div class="welcome-msg">
					<span style="font-size: 1.2em; font-weight: bold;">👥 게시판
						글쓰기 권한 통합 관리</span>
					<p style="font-size: 0.9em; color: #666; margin-top: 5px;">
						게시판을 선택하고 사원을 체크한 뒤, 중앙 버튼으로 글쓰기 권한을 부여 하세요.</p>
				</div>
			</div>

			<div class="transfer-container">
				<div class="transfer-box">
					<div class="box-header">
						<span>📌 게시판</span> 
					</div>
					<div class="box-content">
						<table class="shuttle-table" id="leftTable">
							<thead>
								<tr>
									<th>번호</th>
									<th>게시판 명</th>
									<th>현황</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="board : ${boardList}"
									th:if="${(session.loginUser.user_role == 'MASTER' or (session.loginUser.user_role == 'ADMIN' and board.emp_no == session.loginUser.emp_no)) 
									and
									(board['b_no'] < 1001 or board['b_no'] > 1010) and
									(board.b_no != 6666 and board.b_no != 7777 and board.b_no != 8888)}"
									th:onclick="selectBoard(this)" th:data-bno="${board.b_no}"
									style="cursor: pointer;">

									<td th:text="${board.b_no}">1</td>
									<td th:text="${board.b_name}">게시판명</td>
									<td>
										<button class="btn-boardAdd" type="button"
											th:data-id="${board.b_no}" th:data-name="${board.b_name}"
											onclick="event.stopPropagation(); showBoardAdmins(this.getAttribute('data-id'), this.getAttribute('data-name'))">
											명단</button>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>

				<div class="transfer-controls">
					<div class="btn-wrapper" onclick="processPermission('grant')">
						<span class="btn-label">권한 부여</span>
						<button type="button" class="arrow-icon-btn" title="권한 부여">
							⬅</button>
					</div>

				</div>

				<div class="transfer-box" style="flex: 1.3;">
					<div class="box-header">
						<span>👥 대상 사원 선택</span> <span class="count"
							th:text="${#lists.size(userList)} + '명'"></span>
					</div>


					<div class="filter-area"
						style="padding: 10px 15px; background: #f8fafc; border-bottom: 1px solid var(--border-color); display: flex; gap: 10px;">
						<select id="deptFilter" onchange="filterUsers()"
							class="custom-select" style="flex: 1; min-width: auto;">
							<option value="all">전체 부서</option>
						</select>
					</div>

					<div class="box-content">
						<table class="shuttle-table" id="rightTable">
							<thead>
								<tr>
									<th><input type="checkbox" id="selectAll"
										onclick="toggleAll(this)"></th>
									<th>사번</th>
									<th>이름</th>
									<th>부서/직급</th>
									<th>개별확인</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="user : ${userList}"
									th:data-dept="${user.dept_name}">
									<td><input type="checkbox" class="user-check"
										th:value="${user.emp_no}"></td>
									<td th:text="${user.emp_no}">1001</td>
									<td th:text="${user.emp_name}">홍길동</td>
									<td th:text="${user.dept_name} + ' / ' + ${user.rnk_name}">개발/대리</td>
									<td>
										<button class="btn-boardAdd" type="button"
											th:data-id="${user.emp_no}" th:data-name="${user.emp_name}"
											onclick="showEmpAdminBoards(this.getAttribute('data-id'), this.getAttribute('data-name'))">
											조회</button>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</main>
	</div>

	<div id="adminModal" class="modal-overlay" style="display: none;">
		<div class="modal-content">
			<h3 id="modalTitle">권한 정보</h3>
			<div class="modal-body" id="modalContent"></div>
			<div class="modal-footer">
				<button class="btn-cancle" onclick="closeModal()">닫기</button>
			</div>
		</div>
	</div>

	<script th:inline="javascript">
        let selectedBno = null;
        
    

        // 페이지 로드 시 실행
        document.addEventListener("DOMContentLoaded", function() {
            initDeptFilter(); // 부서 필터 목록 초기화 호출
        });

        // 0. 부서 필터 자동 생성 함수 (userList 기반)
        function initDeptFilter() {
            const rows = document.querySelectorAll('#rightTable tbody tr');
            const deptSet = new Set(); // 중복 제거를 위한 Set
            const deptFilter = document.getElementById('deptFilter');

            // 테이블 행에서 부서명 추출
            rows.forEach(row => {
                const dept = row.getAttribute('data-dept');
                if (dept) deptSet.add(dept);
            });

            // 추출된 부서명을 오름차순 정렬하여 select 박스에 추가
            Array.from(deptSet).sort().forEach(dept => {
                const option = document.createElement('option');
                option.value = dept;
                option.textContent = dept;
                deptFilter.appendChild(option);
            });
        }

        // 1. 부서 필터링 함수 (기존 filterUsers 보완)
        function filterUsers() {
            const selectedDept = document.getElementById('deptFilter').value;
            const rows = document.querySelectorAll('#rightTable tbody tr');
            let visibleCount = 0;

            rows.forEach(row => {
                const userDept = row.getAttribute('data-dept');
                
                if (selectedDept === 'all' || userDept === selectedDept) {
                    row.style.display = ''; // 보임
                    visibleCount++;
                } else {
                    row.style.display = 'none'; // 숨김
                }
            });

            // '대상 사원 선택' 옆의 명수 업데이트 (id="userCount"가 없으므로 클래스로 접근하거나 id 추가 필요)
            const countSpan = document.querySelector('.transfer-box:last-child .count');
            if(countSpan) countSpan.innerText = visibleCount + '명';
            
            document.getElementById('selectAll').checked = false;
        }

        // 전체 선택 기능 (필터링된 대상만 선택되도록 개선)
        function toggleAll(masterCheckbox) {
            const rows = document.querySelectorAll('#rightTable tbody tr');
            
            rows.forEach(row => {
                // 현재 화면에 보이는(display가 none이 아닌) 행의 체크박스만 제어
                if (row.style.display !== 'none') {
                    const checkbox = row.querySelector('.user-check');
                    if (checkbox) checkbox.checked = masterCheckbox.checked;
                }
            });
        }

        // 1. 게시판 선택 (단일)
        function selectBoard(row) {
            document.querySelectorAll('#leftTable tbody tr').forEach(r => r.classList.remove('selected'));
            row.classList.add('selected');
            selectedBno = row.getAttribute('data-bno');
        }

        // 2. 전체 선택/해제
        function toggleAll(master) {
            document.querySelectorAll('.user-check').forEach(check => check.checked = master.checked);
        }

     // 3. 권한 부여/해제 처리 (수정 버전)
        async function processPermission(type) {
            if (!selectedBno) return alert("왼쪽에서 관리할 게시판을 먼저 선택해주세요.");
            
            // [추가] 현재 선택된 게시판 행에서 이름을 가져옵니다.
            const selectedRow = document.querySelector('#leftTable tbody tr.selected');
            const currentBName = selectedRow ? selectedRow.cells[1].innerText : "";
            
            const selectedEmps = Array.from(document.querySelectorAll('.user-check:checked')).map(cb => cb.value);
            if (selectedEmps.length === 0) return alert("오른쪽에서 대상 사원을 체크해주세요.");

            const confirmMsg = type === 'grant' ? "권한을 부여하시겠습니까?" : "권한을 해제하시겠습니까?";
            if (!confirm(confirmMsg)) return;

            const url = type === 'grant' ? "/master/admins/write" : "/master/boards/revoke";
            
            try {
                for (const empNo of selectedEmps) {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: `b_no=${selectedBno}&emp_no=${empNo}`
                    });
                    const result = await response.text();
                    console.log(`사번 ${empNo} 처리 결과: ${result}`);
                }

                alert("처리가 완료되었습니다.");
                
                // [수정] showBoardAdmins 호출 시 게시판 이름(currentBName)을 함께 전달합니다.
                setTimeout(() => {
                    showBoardAdmins(selectedBno, currentBName);
                }, 100);

            } catch (e) {
                console.error("권한 처리 중 에러 발생:", e);
                alert("처리 중 오류가 발생했습니다.");
            }
        }

        // 4. 게시판별 글쓰기 명단 조회 (사라졌던 기능)
        function showBoardAdmins(bNo, bName) {
    fetch(`/master/boards/${bNo}/admins`)
        .then(res => res.json())
        .then(list => {
            document.getElementById('modalTitle').textContent = `[${bName}]`;
            
            // 테이블 구조 (컬럼 추가: 관리)
            let html = '<table class="access-table" style="width:100%; text-align:center;">';
            html += '   <colgroup>';
            html += '       <col style="width: 20%;">'; // 사번
            html += '       <col style="width: 30%;">'; // 이름
            html += '       <col style="width: 30%;">'; // 부서
            html += '       <col style="width: 20%;">'; // 버튼
            html += '   </colgroup>';
            html += '   <thead>';
            html += '       <tr>';
            html += '           <th>사번</th>';
            html += '           <th>이름</th>';
            html += '           <th>부서</th>';
            html += '           <th>글쓰기</th>'; // [추가]
            html += '       </tr>';
            html += '   </thead>';
            html += '   <tbody>';

            if(!list || list.length === 0) {
                html += '<tr><td colspan="4">현재 등록된 글쓰기 권한 유저가 없습니다.</td></tr>';
            } else {
                list.forEach(item => {
                    html += `<tr>`;
                    html += `   <td>${item.emp_no}</td>`;
                    html += `   <td>${item.emp_name}</td>`;
                    html += `   <td>${item.dept_name}</td>`;
                    html += `   <td>`;
                    // [추가] 해제 버튼 (클릭 시 revokeAdminOne 호출)
                    html += `       <button type="button" class="btn-cancle" style="font-size:12px; padding:2px 8px;" `;
                    html += `               onclick="revokeAdminOne(${bNo}, '${bName}', ${item.emp_no})">해제</button>`;
                    html += `   </td>`;
                    html += `</tr>`;
                });
            }
            html += '   </tbody>';
            html += '</table>';

            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('adminModal').style.display = 'flex';
        })
        .catch(err => {
            console.error("명단 조회 실패:", err);
            alert("명단을 불러오지 못했습니다.");
        });
	}

        // 5. 사원별 관리 게시판 조회
	function showEmpAdminBoards(empNo, empName) {
	    fetch(`/master/emp/${empNo}/admin-boards`)
	        .then(res => res.json())
	        .then(list => {
	            // 타이틀 설정
	            document.getElementById('modalTitle').textContent = `[${empName}] 님의 글쓰기권한`;
	            
	            // 테이블 헤더 생성 (기존 명단 버튼과 동일한 스타일 클래스 access-table 사용)
	            let html = '<table class="access-table">';
	            html += '   <thead>';
	            html += '       <tr>';
	            html += '           <th style="width: 30%;">번호</th>';
	            html += '           <th>게시판 명</th>';
	            html += '       </tr>';
	            html += '   </thead>';
	            html += '   <tbody>';
	
	            // 데이터가 없을 경우 처리
	            if(!list || list.length === 0) {
	                html += '<tr><td colspan="2">관리 중인 게시판이 없습니다.</td></tr>';
	            } else {
	                // 데이터 반복 출력
	                list.forEach(b => {
	                    html += `<tr>`;
	                    html += `   <td>${b.b_no}</td>`; // 게시판 번호
	                    html += `   <td>${b.b_name}</td>`; // 게시판 이름
	                    html += `</tr>`;
	                });
	            }
	
	            html += '   </tbody>';
	            html += '</table>';
	
	            // 모달에 HTML 주입 및 표시
	            document.getElementById('modalContent').innerHTML = html;
	            document.getElementById('adminModal').style.display = 'flex';
	        });
	}

        
	function revokeAdminOne(bNo, bName, empNo) {
	    if(!confirm("이 사용자의 관리 권한을 해제하시겠습니까?")) return;
	
	    fetch("/master/boards/revoke1", {
	        method: 'POST',
	        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
	        body: `b_no=${bNo}&emp_no=${empNo}`
	    })
	    .then(res => res.text())
	    .then(result => {
	        alert("해제되었습니다.");
	        // 목록 갱신 (현재 창 유지)
	        showBoardAdmins(bNo, bName);
	    })
	    .catch(err => {
	        console.error("해제 실패:", err);
	        alert("처리 중 오류가 발생했습니다.");
	    });
	}
        
        
        

        function closeModal() { document.getElementById('adminModal').style.display = 'none'; }
        
        
        
        
        
        
        
        
    </script>
</body>
</html>
