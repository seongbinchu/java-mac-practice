
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Smart Greentech - Food List</title>
<link rel="stylesheet" th:href="@{/style/style.css}">
<style>
/* 기본 테이블 스타일 */
.board-table {
	width: 100%;
	table-layout: fixed;
	margin-top: 20px;
	border-collapse: collapse;
	background: white;
	border-radius: 8px;
	overflow: hidden;
	box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
}

.board-table th {
	background: #f8fafc;
	padding: 15px;
	color: #475569;
	font-weight: 700;
	border-bottom: 2px solid #e2e8f0;
}

.board-table td {
	padding: 15px;
	border-bottom: 1px solid #f1f5f9;
	color: #334155;
}

.board-table tr:hover {
	background-color: #f8fafc;
}

/* [NEW] 상단 헤더 카드 스타일 */
.food-header-card {
	background-color: white;
	padding: 25px 30px;
	border-radius: 16px;
	box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
	display: flex;
	justify-content: space-between;
	align-items: center;
	border: 1px solid #e2e8f0;
	margin-bottom: 20px;
}

.header-title h2 {
	margin: 0;
	font-size: 22px;
	font-weight: 800;
	color: #1e293b;
	display: flex;
	align-items: center;
	gap: 8px;
}

.header-desc {
	font-size: 13px;
	color: #94a3b8;
	margin-top: 5px;
	margin-left: 2px;
}

/* [NEW] 예쁜 버튼 그룹 */
.btn-group-custom {
	display: flex;
	gap: 12px;
}

/* 1. 맛집 등록 버튼 (파란색 그라데이션) */
.btn-gradient-blue {
	display: flex;
	align-items: center;
	gap: 8px;
	padding: 12px 24px;
	background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
	color: white;
	border: none;
	border-radius: 30px;
	font-size: 15px;
	font-weight: 700;
	cursor: pointer;
	box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
	transition: transform 0.2s, box-shadow 0.2s;
}

.btn-gradient-blue:hover {
	transform: translateY(-2px);
	box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
}

/* 2. 랜덤 추천 버튼 (민트색 그라데이션) */
.btn-gradient-mint {
	display: flex;
	align-items: center;
	gap: 8px;
	padding: 12px 24px;
	background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
	color: white;
	border: none;
	border-radius: 30px;
	font-size: 15px;
	font-weight: 700;
	cursor: pointer;
	box-shadow: 0 4px 15px rgba(56, 249, 215, 0.3);
	transition: transform 0.2s, box-shadow 0.2s;
}

.btn-gradient-mint:hover {
	transform: translateY(-2px);
	box-shadow: 0 6px 20px rgba(56, 249, 215, 0.4);
}
</style>
</head>
<body>
	<header th:replace="~{layout/layout :: myHeader}"></header>

	<div class="container">
		<nav th:replace="~{layout/layout :: mySidebar}"></nav>

		<main class="content">

			<div class="food-header-card">
				<div class="header-title">
					<h2>🍽️ 점심메뉴 추천 게시판</h2>
					<div class="header-desc">오늘 점심 뭐 먹지? 동료들과 맛집을 공유해보세요!</div>
				</div>

				<div class="btn-group-custom">
					<button type="button" class="btn-gradient-blue"
						onclick="location.href='/foodwrite'">
						<span>✏️</span> 맛집 등록
					</button>

					<button type="button" class="btn-gradient-mint"
						onclick="location.href='/foodrandomview'">
						<span>🎲</span> 랜덤 추천 받기
					</button>
				</div>
			</div>

			<table class="board-table">
				<thead>
					<tr>
						<th class="num" style="width: 8%;">번호</th>
						<th class="title" style="width: 52%;">식당 이름 (제목)</th>
						<th class="date" style="width: 10%;">조회수</th>
						<th class="count" style="width: 10%;">추천</th>
						<th class="like" style="width: 20%;">등록일</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="article, iterStat : ${articles}">

						<td class="num"
							th:text="${totalCount - ((page - 1) * pageSize) - iterStat.index}"
							style="text-align: center; color: #64748b;">1</td>

						<td class="title"><a
							th:href="@{/foodview(art_no=${article.art_no})}"
							th:text="${article.art_title}"
							style="text-decoration: none; color: #334155; font-weight: 600; display: block; padding-left: 10px;">
								식당 제목 </a></td>

						<td class="count" th:text="${article.art_count}"
							style="text-align: center; color: #94a3b8;">0</td>

						<td class="like" th:text="${article.art_like}"
							style="text-align: center; color: #f59e0b; font-weight: bold;">0</td>

						<td class="date" th:text="${article.art_date}"
							style="text-align: center; color: #94a3b8;">2026-01-28</td>
					</tr>

					<tr th:if="${#lists.isEmpty(articles)}">
						<td colspan="3"
							style="text-align: center; padding: 50px; color: #cbd5e1;">
							등록된 맛집이 없습니다. 첫 번째 맛집을 등록해보세요!</td>
					</tr>
				</tbody>
			</table>

			<div th:if="${keyword != null && keyword != ''}" >
				<strong>"<span th:text="${keyword}"></span>"</strong>(으)로 검색 결과 총 <span th:text="${totalCount}"></span>개 검색 되었습니다.
			</div>
			<div class="pagination">
				<a th:if="${page > 1}"
					th:href="@{/foodlist(searchType=${searchType}, 
				    	keyword=${keyword}, 
				    	page=${page - 1}, 
				    	pageSize=${pageSize})}">
					&laquo; <!-- 왼쪽 화살표 -->
				</a>
				<span
					th:each="i : ${#numbers.sequence((page - 2) > 1 ? (page - 2) : 1, (page + 2) < totalPage ? (page + 2) : totalPage)}">
					<a
					th:href="@{/foodlist(searchType=${searchType},
                					keyword=${keyword}, 
                					page=${i},
                					pageSize=${pageSize}
                					)}"
					th:text="${i}" th:classappend="${i == page} ? 'active' : ''"> </a>
				</span> <a th:if="${page < totalPage}"
					th:href="@{/foodlist(searchType=${searchType}, 
				    	keyword=${keyword}, 
				    	page=${page + 1}, 
				    	pageSize=${pageSize})}">
					&raquo; <!-- 오른쪽 화살표 -->
				</a>
			</div>
			<div class="search-section">
				<form th:action="@{/foodlist}" method="get">
					<select name="searchType">
						<option value="art_title">제목</option>
					</select> <input type="text" name="keyword" placeholder="검색 내용을 입력해주세요."
						style="padding: 5px; width: 250px;"> <input type="hidden"
						name="pageSize" placeholder="10" min="1" th:value="|${pageSize}|"
						style="padding: 5px; width: 100px;">
					<button type="submit"
						style="padding: 5px 15px; background: #7ab730; color: white; border: none; cursor: pointer;">검색</button>
				</form>
			</div>

		</main>
	</div>
</body>
</html>
