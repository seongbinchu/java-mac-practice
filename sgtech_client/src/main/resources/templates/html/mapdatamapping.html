<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>부산 맛집 가이드</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=d4b30a74e605ae4d61e65b8e77db1bc6"></script>
    <style>
        #map { 
            width: 100%; 
            height: 600px; 
            background-color: #f8f8f8; 
            border: 1px solid #ddd;
        }
        .info-content { padding: 10px; min-width: 200px; line-height: 1.5; }
        .info-title { font-weight: bold; font-size: 15px; margin-bottom: 5px; color: #2c3e50; }
        .info-body { font-size: 12px; color: #555; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">부산광역시 맛집 지도 (상세보기)</h2>
    <div id="map"></div>

    <script>
        window.onload = function() {
            if (typeof kakao === 'undefined') {
                alert("카카오 지도 라이브러리를 불러오지 못했습니다.");
                return;
            }

            var mapContainer = document.getElementById('map');
            var mapOption = { 
                center: new kakao.maps.LatLng(35.1795543, 129.0756416), 
                level: 8 
            };
            var map = new kakao.maps.Map(mapContainer, mapOption);

            var infowindow = new kakao.maps.InfoWindow({
                removable: true
            });

            var xhr = new XMLHttpRequest();
            var url = 'https://apis.data.go.kr/6260000/FoodService/getFoodKr'; 
            var serviceKey = 'NKQ2XlCx4B3RtPtSC02%2FDPddJK2HHSfHtZT9ETamnNf2JOJCMkRoSxDK9xdH6HTkGl2g0dYrVQyu84r%2FutoM9A%3D%3D';

            var queryParams = '?' + encodeURIComponent('serviceKey') + '=' + serviceKey; 
            queryParams += '&' + encodeURIComponent('pageNo') + '=' + encodeURIComponent('1'); 
            queryParams += '&' + encodeURIComponent('numOfRows') + '=' + encodeURIComponent('300'); 
            queryParams += '&' + encodeURIComponent('resultType') + '=' + encodeURIComponent('json'); 

            xhr.open('GET', url + queryParams);
            xhr.onreadystatechange = function () {
                if (this.readyState == 4 && this.status == 200) {
                    var responseData = JSON.parse(this.responseText);
                    var items = responseData.getFoodKr.item;

                    items.forEach(function(item) {
                        var lat = parseFloat(item.LAT);
                        var lng = parseFloat(item.LNG);
                        
                        if (!isNaN(lat) && !isNaN(lng)) {
                            var marker = new kakao.maps.Marker({
                                map: map,
                                position: new kakao.maps.LatLng(lat, lng)
                            });

                            kakao.maps.event.addListener(marker, 'click', function() {
                                var content = `
                                    <div class="info-content">
                                        <div class="info-title">${item.MAIN_TITLE}</div>
                                        <div class="info-body">
                                            <b> 주소:</b> ${item.ADDR1}<br>
                                            <b> 대표메뉴:</b> ${item.RPRSNTV_MENU || '정보없음'}<br>
                                            <b> 시간:</b> ${item.USAGE_DAY_WEEK_AND_TIME || '정보없음'}
                                        </div>
                                    </div>
                                `;
                                
                                infowindow.setContent(content);
                                infowindow.open(map, marker);
                            });
                        }
                    });
                }
            };
            xhr.send('');
        };
    </script>
</body>
</html>
