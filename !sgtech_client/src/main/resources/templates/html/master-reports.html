<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>관리자 신고 관리</title>
<link rel="stylesheet" th:href="@{/style/style.css}">

</head>
<body>
	<header th:replace="~{layout/layout :: myHeader}"></header>
	<div
		th:if="${session.loginUser != null and session.loginUser.user_role == 'MASTER'}"
		th:replace="~{layout/master-layout :: masterTabs('boards')}"></div>

	<div class="container">
		<main class="content">
			<div class="header-row">
				<div class="welcome-msg">
					<span style="font-size: 20px; font-weight: bold; color: #334155;">🚨
						신고 관리</span>
				</div>
			</div>

			<table class="board-table">
				<colgroup>
					<col width="5%">
					<col width="45%">
					<col width="10%">
					<col width="15%">
					<col width="10%">
					<col width="10%">
					<col width="5%">
				</colgroup>
				<thead>
					<tr>
						<th class="no">No</th>
						<th class="title">신고된 글</th>
						<th class="name">신고자</th>
						<th class="reason">사유</th>
						<th class="board">게시판</th>
						<th class="already">상태</th>
						<th class="delete">관리</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="report : ${reports}"
						master-reports.html
	th:if="${session.loginUser.user_role == 'MASTER' or (session.loginUser.user_role == 'ADMIN' and report['b_no'] == session.loginUser.admin_b_no)}">

						<td class="no" th:text="${report.rep_no}">1</td>

						<td th:if="${report.b_no != 8888}" class="title" style="text-align: left; padding-left: 15px;">
							<a th:href="@{/view(art_no=${report.art_no})}"
							th:text="${report.art_title}"
							style="color: #334155; font-weight: 600;"> 신고글 제목 </a>
						</td>
						<td th:if="${report.b_no == 8888}" class="title" style="text-align: left; padding-left: 15px;">
							<a th:href="@{/foodview(art_no=${report.art_no})}"
							th:text="${report.art_title}"
							style="color: #334155; font-weight: 600;"> 신고글 제목 </a>
						</td>
						<td class="name" th:text="${report.emp_name}">홍길동</td>
						<td class="reason" th:text="${report.rep_reason}"
							style="color: #ef4444;">욕설</td>
						<td class="board" th:text="${report.b_name}">자유</td>

						<td class="already"><span
							th:if="${report.rep_is_read == 'Y'}" class="status-done">처리완료</span>
							<button type="button" th:unless="${report.rep_is_read == 'Y'}"
								class="btn-action btn-read"
								th:onclick="makeAlready(this, [[${report.rep_no}]])">✔
								확인</button></td>

						<td class="delete">
							<button type="button" class="btn-action btn-delete"
								th:onclick="doDeleteReport(this, [[${report.rep_no}]])">
								삭제</button>
						</td>
					</tr>

					<tr th:if="${#lists.isEmpty(reports)}">
						<td colspan="7"
							style="text-align: center; padding: 50px; color: #cbd5e1;">
							접수된 신고 내역이 없습니다.</td>
					</tr>
				</tbody>
			</table>

			<div th:if="${keyword != null && keyword != ''}" >
				<strong>"<span th:text="${keyword}"></span>"</strong>(으)로 검색 결과 총 <span th:text="${totalCount}"></span>개 검색 되었습니다.
			</div>
			<div class="pagination">
				<a th:if="${page > 1}"
					th:href="@{/master/reports(searchType=${searchType}, 
				    	keyword=${keyword}, 
				    	page=${page - 1}, 
				    	pageSize=${pageSize})}">
					&laquo; <!-- 왼쪽 화살표 -->
				</a> <span
					th:each="i : ${#numbers.sequence((page - 2) > 1 ? (page - 2) : 1, (page + 2) < totalPage ? (page + 2) : totalPage)}">
					<a
					th:href="@{/master/reports(searchType=${searchType},
                					keyword=${keyword}, 
                					page=${i},
                					pageSize=${pageSize}
                					)}"
					th:text="${i}" th:classappend="${i == page} ? 'active' : ''"> </a>
				</span> <a th:if="${page < totalPage}"
					th:href="@{/master/reports(searchType=${searchType}, 
				    	keyword=${keyword}, 
				    	page=${page + 1}, 
				    	pageSize=${pageSize})}">
					&raquo; <!-- 오른쪽 화살표 -->
				</a>
			</div>
			<div class="search-section">
				<form th:action="@{/master/reports}" method="get">
					<select name="searchType">
						<option value="art_title"
							th:selected="|${searchType == 'art_title'}|">신고글 제목</option>
						<option value="emp_name"
							th:selected="|${searchType == 'emp_name'}"|>작성자</option>
						<option value="b_name" th:selected="|${searchType == 'b_name'}|">게시판
							이름</option>
					</select> <input type="text" name="keyword" placeholder="검색 내용을 입력해주세요."
						style="padding: 5px; width: 250px;" th:value="|${keyword}|">
					<input type="hidden" name="pageSize" placeholder="10" min="1"
						th:value="|${pageSize}|" style="padding: 5px; width: 100px;">
					<button type="submit"
						style="padding: 5px 15px; background: #7ab730; color: white; border: none; cursor: pointer;">검색</button>
				</form>
			</div>
		</main>
	</div>

	<script th:inline="javascript">
    // 1. 읽음 처리 (UI 즉시 변경)
    function makeAlready(btn, repNo) {
        if (!confirm("확인 처리 하시겠습니까?")) return;

        // [중요] 매핑 주소 확인: /master/readReport
        fetch('/master/readReport', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'rep_no=' + repNo
        })
        .then(res => res.text())
        .then(data => {
            if (data === "success") {
                // 버튼을 '처리완료' 텍스트로 교체 (부모 요소의 내용을 바꿈)
                const parentTd = btn.parentElement;
                parentTd.innerHTML = '<span class="status-done">처리완료</span>';
            } else {
                alert("처리 실패: 서버 오류가 발생했습니다.");
            }
        })
        .catch(err => console.error(err));
    }
    
    // 2. 삭제 처리
    function doDeleteReport(btn, repNo) {
        if (!confirm("정말 삭제하시겠습니까?")) return;

        fetch('/master/deleteReport', { 
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'rep_no=' + repNo
        })
        .then(res => res.text())
        .then(data => {
            if (data === "success") {
                alert("삭제되었습니다.");
                btn.closest('tr').remove();
            } else {
                alert("삭제 실패");
            }
        })
        .catch(err => console.error(err));
    }
    </script>
</body>
</html>
