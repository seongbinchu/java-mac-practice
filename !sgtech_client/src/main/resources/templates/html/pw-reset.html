<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenTest - 비밀번호 재설정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .reset-card { max-width: 450px; margin: 100px auto; border-radius: 15px; border: none; }
        .step-box { display: none; }
        .step-active { display: block; }
        .btn-primary { background-color: #007bff; border: none; }
        .input-group-text { background-color: #e9ecef; }
    </style>
</head>
<body>

<div class="container">
    <div class="card shadow reset-card p-4">
        <h3 class="text-center mb-4">비밀번호 찾기</h3>
        
        <div class="progress mb-4" style="height: 5px;">
            <div id="progress-bar" class="progress-bar" role="progressbar" style="width: 33%;"></div>
        </div>

        <div id="step1" class="step-box step-active">
            <label class="form-label fw-bold">사원 번호</label>
            <div class="input-group mb-3">
                <input type="number" id="emp_no" class="form-control" placeholder="사번을 입력하세요">
                <button class="btn btn-outline-secondary" type="button" onclick="fn_checkUser()">확인</button>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">등록된 이메일</label>
                <input type="email" id="email" class="form-control" placeholder="사번 확인 시 자동 입력됩니다" readonly>
                <div id="email-help" class="form-text text-danger" style="display:none;">등록된 이메일 정보를 찾을 수 없습니다.</div>
            </div>

            <button id="btn-send-code" onclick="fn_sendCode()" class="btn btn-primary w-100" disabled>인증 코드 발송</button>
        </div>

        <div id="step2" class="step-box">
            <div class="alert alert-info py-2 mb-3 small">
                해당 이메일로 전송된 6자리 코드를 입력해주세요.
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">인증 번호</label>
                <input type="text" id="auth_code" class="form-control" placeholder="숫자 6자리">
            </div>
            <button onclick="fn_verifyCode()" class="btn btn-success w-100">코드 확인</button>
        </div>

        <div id="step3" class="step-box">
            <div class="mb-3">
                <label class="form-label fw-bold">새 비밀번호 설정</label>
                <input type="password" id="new_pw" class="form-control" placeholder="새로운 비밀번호 입력">
            </div>
            <button onclick="fn_completeReset()" class="btn btn-danger w-100">비밀번호 변경 완료</button>
        </div>
    </div>
</div>

<script>
    // 클라이언트 컨트롤러의 @RequestMapping("/pw-reset") 기준
    const BASE_URL = "/pw-reset";

    // 1-1. 사번으로 이메일 정보 가져오기
    function fn_checkUser() {
        const emp_no = $('#emp_no').val();
        if(!emp_no) { alert("사번을 입력해주세요."); return; }

        $.ajax({
            url: BASE_URL + "/get-email/" + emp_no,
            type: "GET",
            success: function(email) {
                if(email && email !== "not_found") {
                    $('#email').val(email);
                    $('#email-help').hide();
                    $('#btn-send-code').attr('disabled', false); // 버튼 활성화
                    alert("사원 정보가 확인되었습니다.");
                } else {
                    alert("일치하는 사원 정보가 없습니다.");
                    $('#email').val("");
                    $('#email-help').show();
                    $('#btn-send-code').attr('disabled', true);
                }
            },
            error: function() {
                alert("서버 통신 중 오류가 발생했습니다.");
            }
        });
    }

    // 1-2. 인증 코드 발송
    function fn_sendCode() {
        const emp_no = $('#emp_no').val();
        const email = $('#email').val();

        $.post(BASE_URL + "/send-code", { emp_no: emp_no, email: email }, function(res) {
            if(res === "success") {
                alert("인증번호가 발송되었습니다.");
                showStep(2, '66%');
            } else {
                alert("인증번호 발송에 실패했습니다.");
            }
        });
    }

    // 2. 인증 코드 검증
    function fn_verifyCode() {
        const emp_no = $('#emp_no').val();
        const auth_code = $('#auth_code').val();

        $.post(BASE_URL + "/verify", { emp_no: emp_no, auth_code: auth_code }, function(res) {
            if(res === "success") {
                alert("인증에 성공했습니다. 새 비밀번호를 설정하세요.");
                showStep(3, '100%');
            } else {
                alert("인증번호가 일치하지 않거나 만료되었습니다.");
            }
        });
    }

    // 3. 비밀번호 재설정 완료
    function fn_completeReset() {
        const emp_no = $('#emp_no').val();
        const new_pw = $('#new_pw').val();

        if(!new_pw) { alert("새 비밀번호를 입력해주세요."); return; }

        $.post(BASE_URL + "/complete", { emp_no: emp_no, new_pw: new_pw }, function(res) {
            if(res === "success") {
                alert("비밀번호가 성공적으로 변경되었습니다.");
                location.href = "/login"; // 실제 로그인 페이지 경로로 수정
            } else {
                alert("변경에 실패했습니다.");
            }
        });
    }

    // 화면 전환 함수
    function showStep(stepNum, progressWidth) {
        $('.step-box').removeClass('step-active');
        $('#step' + stepNum).addClass('step-active');
        $('#progress-bar').css('width', progressWidth);
    }
</script>

</body>
</html>
