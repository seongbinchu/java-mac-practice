
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>게시판 목록</title>
<link rel="stylesheet" th:href="@{/style/style.css}">
</head>
<body>
	<header th:replace="~{layout/layout :: myHeader}"></header>

	<div class="container">
		<nav th:replace="~{layout/layout :: mySidebar}"></nav>

		<main class="content">

			<div class="header-row">
				<div class="page-title-area">
					<span class="board-title"
						th:text="${currentBoard != null ? currentBoard.b_name + ' 게시판' : '게시판 목록'}">
						개발 게시판 </span>
				</div>

				<div class="header-actions" th:if="${currentBoard != null}">
					<button type="button" class="btn-write"
						th:if="${currentBoard.b_no != 9999 or session.loginUser.user_role == 'ADMIN' or session.loginUser.user_role == 'MASTER'}"
						th:onclick="|location.href='@{/write(b_no=${currentBoard.b_no})}'|">
						✏️ 글쓰기</button>
				</div>
			</div>

			<table class="board-table">
				<colgroup>
					<col width="5%" class="col-fav">
					<col width="5%" class="col-num">
					<col width="60%" class="col-title">
					<col width="10%" class="col-writer">
					<col width="5%" class="col-count">
					<col width="5%" class="col-like">
					<col width="10%" class="col-date">
				</colgroup>
				<thead>
					<tr>
						<th class="like">⭐</th>
						<th class="num">번호</th>
						<th class="title">제목</th>
						<th class="writer">작성자</th>
						<th class="count">조회</th>
						<th class="like">추천</th>
						<th class="date">날짜</th>
					</tr>
				</thead>
				<tbody>
					<!-- 1. th:each에 iterStat 추가 -->
					<tr th:each="article, iterStat : ${articles}">
						<th:block
							th:if="${currentBoard.b_no != 7777 or (session.loginUser.user_role == 'ADMIN' or session.loginUser.user_role == 'MASTER' or session.loginUser.user_no == article.user_no)}">

							<td style="text-align: center;">
								<button type="button" class="star-btn"
									th:onclick="doToggleFav(this, [[${article.art_no}]])">
									<span class="star-icon"
										th:text="${article.isFav == 'Y' ? '★' : '☆'}"
										th:style="${article.isFav == 'Y' ? 'color: #FFD700;' : 'color: #cbd5e1;'}">
										☆ </span>
								</button>
							</td>

							<td class="no"
								th:text="${totalCount - ((page - 1) * pageSize) - iterStat.index}">1</td>

							<td class="title"><span th:if="${currentBoard.b_no == 7777}">🔒</span>
								<a th:href="@{/view(art_no=${article.art_no})}"
								th:text="${article.art_title}">제목</a></td>



							<td class="writer"><span
								th:if="${currentBoard.b_no == 6666}" class="anon">익명</span> <th:block
									th:unless="${currentBoard.b_no == 6666}">
									<span th:text="${article.emp_name}">이름</span>
									<span class="writer-rank" th:text="${article.rnk_name}">직급</span>
								</th:block></td>

							<td class="count" th:text="${article.art_count}">0</td>
							<td class="like" th:text="${article.art_like}">0</td>
							<td class="date" th:text="${article.art_date}">날짜</td>
						</th:block>
					</tr>

					<tr th:if="${#lists.isEmpty(articles)}">
						<td colspan="7" class="no-data">등록된 게시글이 없습니다.</td>
					</tr>
				</tbody>
			</table>
			<div th:if="${keyword != null && keyword != ''}">
				<strong>"<span th:text="${keyword}"></span>"
				</strong>(으)로 검색 결과 총 <span th:text="${totalCount}"></span>개 검색 되었습니다.
			</div>
			<div class="pagination">
				<a th:if="${page > 1}"
					th:href="@{/list(searchType=${searchType}, 
				    	keyword=${keyword}, 
				    	page=${page - 1}, 
				    	pageSize=${pageSize},
				    	b_no=${currentBoard.b_no})}
				    	">
					&laquo; <!-- 왼쪽 화살표 -->
				</a> <span
					th:each="i : ${#numbers.sequence((page - 2) > 1 ? (page - 2) : 1, (page + 2) < totalPage ? (page + 2) : totalPage)}">
					<a
					th:href="@{/list(searchType=${searchType},
                					keyword=${keyword}, 
                					page=${i},
                					pageSize=${pageSize},
				    				b_no=${currentBoard.b_no}
                					)}"
					th:text="${i}" th:classappend="${i == page} ? 'active' : ''"> </a>
				</span> <a th:if="${page < totalPage}"
					th:href="@{/list(searchType=${searchType}, 
				    	keyword=${keyword}, 
				    	page=${page + 1}, 
				    	pageSize=${pageSize},
				    	b_no=${currentBoard.b_no})
				    	}">
					&raquo; <!-- 오른쪽 화살표 -->
				</a>
			</div>
			<div class="search-section">
				<form th:action="@{/list}" method="get">
					<input type="hidden" name="b_no" th:value="${currentBoard.b_no}">
					<select name="searchType">
						<option value="art_title">게시글 제목</option>
						<option value="art_content">게시글 내용</option>
						<option value="emp_name">작성자</option>
					</select> <input type="text" name="keyword" placeholder="검색 내용을 입력해주세요."
						style="padding: 5px; width: 250px;"> <input type="hidden"
						name="pageSize" placeholder="10" min="1" th:value="|${pageSize}|"
						style="padding: 5px; width: 100px;">
					<button type="submit"
						style="padding: 5px 15px; background: #7ab730; color: white; border: none; cursor: pointer;">검색</button>
				</form>
			</div>
		</main>
	</div>
	<script>
			window.onload = function() {
		        const urlParams = new URLSearchParams(window.location.search);
		        const error = urlParams.get('error');

		        if (error === 'unauthorized') {
		            alert("글쓰기 권한이 없습니다. 관리자에게 문의하세요.");
		        } 
		        
		        if (error) {
		            window.history.replaceState({}, document.title, window.location.pathname);
		        }
		    };	
			
    function doToggleFav(btn, artNo) {
        fetch('/api/fav-toggle?artNo=' + artNo, { method: 'POST' })
        .then(res => res.json())
        .then(isAdded => {
            const starSpan = btn.querySelector('.star-icon');
            if (isAdded) {
                starSpan.innerText = '★';
                starSpan.style.color = '#FFD700';
                if (confirm("즐겨찾기에 등록되었습니다! 목록으로 이동하시겠습니까?")) {
                    location.href = '/favorites';
                }
            } else {
                starSpan.innerText = '☆';
                starSpan.style.color = '#cbd5e1';
                alert("즐겨찾기가 해제되었습니다.");
            }
        })
        .catch(err => {
            console.error("Error:", err);
            alert("오류가 발생했습니다.");
        });
    }
    </script>
</body>
</html>
